name: ElyraLauncher Validation

"on":
  push:
    branches:
      - main
      - import/**
  pull_request:
  workflow_dispatch:

jobs:
  repository-sanity:
    name: Repository sanity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository layout
        run: |
          echo "ElyraLauncher repository sanity check"

          find . \
            -maxdepth 3 \
            -type f \
            | sort \
            | head -200

      - name: Validate required metadata
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f ROADMAP.md
          test -f VERIFICATION.md

          test -f docs/MIGRATION_STATUS.md
          test -f docs/ARCHITECTURE.md
          test -f docs/COMPANION_REPOS.md
          test -f docs/CHERRY_PICK_PLAN.md

      - name: Check Launcher3/Quickstep hints
        run: |
          echo "Checking common Launcher3/Quickstep paths..."

          test -d src || echo "src/ not found yet"
          test -d res || echo "res/ not found yet"
          test -d quickstep || echo "quickstep/ not found yet"

          find . \
            \( \
              -name "Launcher.java" \
              -o -name "Launcher.kt" \
            \) \
            -print \
            | head \
            || true

          find . \
            \( \
              -name "QuickstepLauncher.java" \
              -o -name "QuickstepLauncher.kt" \
            \) \
            -print \
            | head \
            || true

          find . \
            \( \
              -name "RecentsView.java" \
              -o -name "RecentsView.kt" \
            \) \
            -print \
            | head \
            || true

          find . \
            \( \
              -name "TaskView.java" \
              -o -name "TaskView.kt" \
            \) \
            -print \
            | head \
            || true

          find . \
            \( \
              -name "TouchInteractionService.java" \
              -o -name "TouchInteractionService.kt" \
            \) \
            -print \
            | head \
            || true

      - name: Explain current limitation
        run: |
          echo "Full Launcher3/Quickstep validation requires Android ROM tree:"
          echo "m ElyraLauncherQuickStep"
