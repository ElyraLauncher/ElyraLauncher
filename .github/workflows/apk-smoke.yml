name: ElyraLauncher APK Smoke Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  standalone-apk:
    name: Standalone APK UI smoke build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build standalone debug APK
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Prepare standalone APK artifact
        run: |
          mkdir -p app/build/outputs/apk/standalone
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/standalone/ElyraLauncher-standalone-debug.apk

      - name: Upload standalone UI smoke APK
        uses: actions/upload-artifact@v4
        with:
          name: ElyraLauncher-standalone-debug
          path: app/build/outputs/apk/standalone/ElyraLauncher-standalone-debug.apk
          if-no-files-found: error

      - name: Print standalone APK path
        run: echo "Standalone APK: app/build/outputs/apk/standalone/ElyraLauncher-standalone-debug.apk"
