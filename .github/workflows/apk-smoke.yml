name: ElyraLauncher APK Smoke Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  standalone-apk:
    name: Standalone Private APK build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build standalone private debug APK
        run: |
          ./gradlew --no-daemon :app:assembleDebug

      - name: Prepare private APK artifact
        run: |
          mkdir -p app/build/outputs/apk/private
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/private/ElyraLauncher-private-debug.apk
          ls -lah app/build/outputs/apk/private

      - name: Upload private APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElyraLauncher-private-debug
          path: app/build/outputs/apk/private/ElyraLauncher-private-debug.apk
          if-no-files-found: error

      - name: Print private APK path
        run: |
          echo "Private APK: app/build/outputs/apk/private/ElyraLauncher-private-debug.apk"
