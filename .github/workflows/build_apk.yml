name: Build ElyraLauncher APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ElyraLauncher
        uses: actions/checkout@v4
        with:
          path: ElyraLauncher

      - name: Checkout ElyraSystemUILibs
        uses: actions/checkout@v4
        with:
          repository: ElyraLauncher/ElyraSystemUILibs
          path: ElyraSystemUILibs

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        working-directory: ElyraLauncher
        run: chmod +x ./gradlew

      - name: Prepare signing config
        if: ${{ secrets.KEYSTORE != '' && secrets.KEYSTORE_PASSWORD != '' && secrets.KEY_ALIAS != '' && secrets.KEY_PASSWORD != '' }}
        working-directory: ElyraLauncher
        run: |
          echo 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}' >> keystore.properties
          echo 'keyAlias=${{ secrets.KEY_ALIAS }}' >> keystore.properties
          echo 'keyPassword=${{ secrets.KEY_PASSWORD }}' >> keystore.properties
          echo 'storeFile=${{ github.workspace }}/ElyraLauncher/key.jks' >> keystore.properties
          echo '${{ secrets.KEYSTORE }}' | base64 --decode > '${{ github.workspace }}/ElyraLauncher/key.jks'

      - name: Build debug APK
        working-directory: ElyraLauncher
        run: ./gradlew assembleDebug --stacktrace

      - name: List APK outputs
        working-directory: ElyraLauncher
        run: find . -path "*/build/outputs/apk/*" -name "*.apk" -type f -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ElyraLauncher-debug-apk
          path: |
            ElyraLauncher/**/build/outputs/apk/**/*.apk
          if-no-files-found: error
