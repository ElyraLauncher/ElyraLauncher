name: Build ElyraLauncher APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feat/lawnchair-style-real-apk-build

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: List APK outputs
        run: find . -path "*/build/outputs/apk/*" -name "*.apk" -type f -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ElyraLauncher-debug-apk
          path: |
            **/build/outputs/apk/**/*.apk
          if-no-files-found: error
