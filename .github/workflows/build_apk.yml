name: Build ElyraLauncher APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ElyraLauncher
        uses: actions/checkout@v4
        with:
          path: ElyraLauncher

      - name: Checkout ElyraSystemUILibs
        uses: actions/checkout@v4
        with:
          repository: ElyraLauncher/ElyraSystemUILibs
          path: ElyraSystemUILibs

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        working-directory: ElyraLauncher
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: ElyraLauncher
        run: ./gradlew assembleDebug --stacktrace

      - name: Prepare release signing
        id: prepare-signing
        working-directory: ElyraLauncher
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > key.jks
            {
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
              echo "storeFile=key.jks"
            } > keystore.properties
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release signing secrets are not configured. Skipping release APK."
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        if: steps.prepare-signing.outputs.available == 'true'
        working-directory: ElyraLauncher
        run: ./gradlew assembleRelease --stacktrace

      - name: List APK outputs
        working-directory: ElyraLauncher
        run: find . -path "*/build/outputs/apk/*" -name "*.apk" -type f -print

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ElyraLauncher-debug-apk
          path: ElyraLauncher/**/build/outputs/apk/debug/**/*.apk
          if-no-files-found: error

      - name: Upload release APK
        if: steps.prepare-signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ElyraLauncher-release-apk
          path: ElyraLauncher/**/build/outputs/apk/release/**/*.apk
          if-no-files-found: error
