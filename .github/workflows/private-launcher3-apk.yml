name: ElyraLauncher Private Launcher3 APK Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  private-launcher3-apk:
    name: Experimental private Launcher3 APK build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zulu JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Audit private Launcher3 APK path
        run: |
          bash scripts/audit-private-launcher3-apk.sh

      - name: Build experimental private Launcher3 debug APK
        run: |
          ./gradlew --no-daemon :launcher-private:assembleDebug

      - name: Prepare private Launcher3 APK artifact
        run: |
          mkdir -p launcher-private/build/outputs/apk/private
          cp launcher-private/build/outputs/apk/debug/launcher-private-debug.apk \
            launcher-private/build/outputs/apk/private/ElyraLauncher-private-launcher3-debug.apk
          ls -lah launcher-private/build/outputs/apk/private

      - name: Upload private Launcher3 APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElyraLauncher-private-launcher3-debug
          path: launcher-private/build/outputs/apk/private/ElyraLauncher-private-launcher3-debug.apk
          if-no-files-found: error
