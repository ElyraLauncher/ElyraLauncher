name: ElyraLauncher CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  architecture-guard:
    name: Architecture guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ROM target and protected paths
        run: |
          test -f Android.bp
          grep -R "ElyraLauncherQuickStep" Android.bp
          test -d src
          test -d quickstep
          test -d res
          test -f AndroidManifest.xml
          test -f AndroidManifest-common.xml

      - name: Check package and protected Quickstep classes
        run: |
          grep -R "package com.android.launcher3" src quickstep >/tmp/package-check.txt
          test -s /tmp/package-check.txt
          find quickstep src -name "QuickstepLauncher.*" | grep .
          find quickstep src -name "RecentsView.*" | grep .
          find quickstep src -name "TaskView.*" | grep .
          find quickstep src -name "TouchInteractionService.*" | grep .

      - name: Check preview workflow removal
        run: |
          test ! -f ".github/workflows/private-""launcher3-apk.yml"

  source-hygiene:
    name: Source hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check misleading source wording
        run: |
          ! grep -R "fake ""recents" . --exclude-dir=.git
          ! grep -R "fake ""quickstep" . --exclude-dir=.git
          ! grep -R "private ""preview" . --exclude-dir=.git
          ! grep -R "private-""launcher3-apk" . --exclude-dir=.git

  docs-check:
    name: Documentation check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required docs
        run: |
          test -f README.md
          test -f ROADMAP.md
          test -f VERIFICATION.md
          test -f AGENTS.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CODE_OF_CONDUCT.md
          test -f CHANGELOG.md
          test -f docs/ARCHITECTURE.md
          test -f docs/ROM_BUILD.md
          test -f docs/GRADLE_APK_BUILD.md

      - name: Check honest standalone wording
        run: |
          ! grep -R "standalone.*proves Quickstep" README.md VERIFICATION.md AGENTS.md docs
          ! grep -R "standalone.*proves Recents" README.md VERIFICATION.md AGENTS.md docs
          ! grep -R "generated by"" AI" README.md ROADMAP.md VERIFICATION.md AGENTS.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md CHANGELOG.md docs
          ! grep -R "Chat""GPT" README.md ROADMAP.md VERIFICATION.md AGENTS.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md CHANGELOG.md docs

  gradle-build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Gradle project
        id: gradle-project
        shell: bash
        run: |
          has_gradle=false
          has_app=false

          if [[ -f gradlew ]] \
            && { [[ -f settings.gradle ]] || [[ -f settings.gradle.kts ]]; } \
            && { [[ -f build.gradle ]] || [[ -f build.gradle.kts ]]; }; then
            has_gradle=true
          fi

          if [[ -f app/build.gradle ]] || [[ -f app/build.gradle.kts ]]; then
            has_app=true
          fi

          echo "has-gradle=${has_gradle}" >> "${GITHUB_OUTPUT}"
          echo "has-app=${has_app}" >> "${GITHUB_OUTPUT}"

      - name: Set up JDK
        if: ${{ steps.gradle-project.outputs.has-gradle == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Show Gradle tasks
        if: ${{ steps.gradle-project.outputs.has-gradle == 'true' }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon tasks

      - name: Build debug APK when app module exists
        if: ${{ steps.gradle-project.outputs.has-gradle == 'true' && steps.gradle-project.outputs.has-app == 'true' }}
        run: |
          echo "Gradle APK build does not validate real Recents or Quickstep."
          echo "ROM target remains ElyraLauncherQuickStep."
          ./gradlew --no-daemon :app:assembleDebug

      - name: Skip Gradle APK build when no Gradle project exists
        if: ${{ steps.gradle-project.outputs.has-gradle != 'true' }}
        run: |
          echo "No Gradle wrapper and root build files were detected."
          echo "Use m ElyraLauncherQuickStep inside a configured Android source tree for ROM validation."
