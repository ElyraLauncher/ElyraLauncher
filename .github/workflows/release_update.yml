name: Release Update

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-notes:
    name: Prepare release notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release notes
        run: |
          mkdir -p build/release
          cat > build/release/notes.md <<'EOF'
          ## ElyraLauncher

          ROM/system validation target: `m ElyraLauncherQuickStep`

          Gradle APK builds do not validate real Quickstep, Recents, privileged launcher behavior, hidden APIs, or system task management. ROM validation is required for those paths.

          Review the changelog and merged pull requests for the full change list.
          EOF

      - name: Publish or update GitHub release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          body_path: build/release/notes.md
          draft: false
          prerelease: false
